<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario PRO</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
}
header{
  padding:15px;
  text-align:center;
  background:#1e293b;
  font-size:20px;
  font-weight:bold;
}
.container{padding:15px;}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

button{
  background:#22c55e;
  border:none;
  padding:10px;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
  color:#fff;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
}

.row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.row input[type="text"]{flex:1;}
.qty{width:70px;text-align:center;}

.hidden{display:none;}

.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
}
</style>
</head>

<body>

<header>Inventario PRO</header>

<div class="container">

<!-- CREAR -->
<div id="crearBox">
  <input id="nombreLista" placeholder="Nombre lista">
  <button onclick="crear()">Crear</button>
</div>

<!-- LISTAS -->
<div id="listas"></div>

<!-- DETALLE -->
<div id="detalle" class="hidden">
  <h2 id="titulo"></h2>

  <div id="items"></div>

  <button id="btnVolver" onclick="volver()">← Volver</button>
  <button id="btnCompartir" onclick="compartir()">📤 Compartir</button>
</div>

<button id="btnAgregar" class="fab" onclick="agregar()">+</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVjGdI5Z3fW8bjHwfBgT5RoOfZZ4Vap8c",
  authDomain: "checklistempresa.firebaseapp.com",
  projectId: "checklistempresa",
  storageBucket: "checklistempresa.appspot.app",
  messagingSenderId: "798095528680",
  appId: "1:798095528680:web:3114c0b18d5b8001826f5d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let actualId=null;
let modoVista=false; // false=creador, "llenar", true=ver

// 🔹 CREAR LISTA
window.crear = async()=>{
  let nombre=document.getElementById("nombreLista").value;
  if(!nombre)return;

  await addDoc(collection(db,"listas"),{
    nombre,
    items:[]
  });

  cargar();
}

// 🔹 CARGAR LISTAS
async function cargar(){
  let cont=document.getElementById("listas");
  cont.innerHTML="";

  let data=await getDocs(collection(db,"listas"));
  data.forEach(docu=>{
    let d=docu.data();

    cont.innerHTML+=`
    <div class="card" onclick="abrir('${docu.id}')">
      ${d.nombre}
    </div>`;
  });
}

// 🔹 ABRIR
window.abrir = async(id)=>{
  actualId=id;

  document.getElementById("crearBox").classList.add("hidden");
  document.getElementById("listas").classList.add("hidden");
  document.getElementById("detalle").classList.remove("hidden");

  let docRef=doc(db,"listas",id);
  let snap=await getDoc(docRef);
  let data=snap.data();

  document.getElementById("titulo").innerText=data.nombre;

  let cont=document.getElementById("items");
  cont.innerHTML="";

  data.items.forEach((item,i)=>{
    let row=document.createElement("div");
    row.className="row";

    let a=document.createElement("input");
    let c=document.createElement("input");

    a.value=item.nombre;
    c.value=item.cantidad;

    a.type="text";
    c.type="number";
    c.className="qty";

    // 🔥 CONTROL MODOS
    if(modoVista===true){
      a.disabled=true;
      c.disabled=true;
    }
    else if(modoVista==="llenar"){
      a.disabled=true;
      c.disabled=false;
    }

    c.onchange=async()=>{
      let nuevos=data.items;
      nuevos[i].cantidad=c.value;

      await updateDoc(docRef,{items:nuevos});
    };

    row.appendChild(a);
    row.appendChild(c);
    cont.appendChild(row);
  });

  // 🔹 SI ES LLENADOR AGREGA 5 ESPACIOS
  if(modoVista==="llenar"){
    for(let i=0;i<5;i++){
      let row=document.createElement("div");
      row.className="row";

      let a=document.createElement("input");
      let c=document.createElement("input");

      a.placeholder="Nuevo artículo";
      c.placeholder="0";

      c.className="qty";

      c.onchange=async()=>{
        let nuevos=data.items;
        nuevos.push({nombre:a.value,cantidad:c.value});
        await updateDoc(docRef,{items:nuevos});
      };

      row.appendChild(a);
      row.appendChild(c);
      cont.appendChild(row);
    }
  }

  controlarUI();
}

// 🔹 AGREGAR (SOLO CREADOR)
window.agregar=async()=>{
  if(modoVista!==false)return;

  let docRef=doc(db,"listas",actualId);
  let snap=await getDoc(docRef);
  let data=snap.data();

  data.items.push({nombre:"",cantidad:0});
  await updateDoc(docRef,{items:data.items});

  abrir(actualId);
}

// 🔹 VOLVER
window.volver=()=>{
  location.href=location.pathname;
}

// 🔹 COMPARTIR
window.compartir=()=>{
  let url="";

  if(modoVista===false){
    url=location.origin+location.pathname+"?id="+actualId+"&modo=llenar";
  }
  else if(modoVista==="llenar"){
    url=location.origin+location.pathname+"?id="+actualId+"&modo=ver";
  }else return;

  if(navigator.share){
    navigator.share({title:"Inventario PRO",url});
  }else{
    navigator.clipboard.writeText(url);
    alert("Link copiado");
  }
}

// 🔹 CONTROL UI
function controlarUI(){
  let v=document.getElementById("btnVolver");
  let c=document.getElementById("btnCompartir");
  let a=document.getElementById("btnAgregar");

  if(modoVista===true){
    v.style.display="none";
    c.style.display="none";
    a.style.display="none";
  }

  if(modoVista==="llenar"){
    v.style.display="none";
    a.style.display="none";
  }
}

// 🔹 INIT
async function init(){
  let p=new URLSearchParams(location.search);
  let id=p.get("id");
  let tipo=p.get("modo");

  if(id){
    if(tipo==="llenar") modoVista="llenar";
    else if(tipo==="ver") modoVista=true;
    else modoVista=false;

    abrir(id);
  }else{
    cargar();
  }
}

init();
</script>

</body>
</html>
