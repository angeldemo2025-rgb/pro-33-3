<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario PRO</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:#fff;
}
header{
  padding:18px;
  text-align:center;
  background: rgba(30,41,59,0.8);
  backdrop-filter: blur(10px);
  font-size:20px;
  font-weight:bold;
  position:sticky;
  top:0;
}
.container{padding:15px;max-width:600px;margin:auto;}
.card{
  background: rgba(30,41,59,0.7);
  padding:15px;
  margin:10px 0;
  border-radius:14px;
}
button{
  background:#22c55e;
  border:none;
  padding:10px;
  border-radius:10px;
  margin:4px;
  color:#fff;
  cursor:pointer;
}
input{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
  width:100%;
  background:#1e293b;
  color:#fff;
}
.row{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.row input[type="text"]{flex:1;}
.qty{width:70px;text-align:center;}
.hidden{display:none;}
.lang{position:absolute;right:10px;top:10px;}
#btnAdd{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  font-size:24px;
}
</style>
</head>

<body>

<header>
Inventario PRO
<select class="lang" onchange="cambiarIdioma(this.value)">
<option value="es">ES</option>
<option value="en">EN</option>
</select>
</header>

<div class="container" id="home">
<input id="nombre" placeholder="Nombre lista">
<button onclick="crear()">Crear</button>
<h3>Listas</h3>
<div id="listas"></div>
</div>

<div class="container hidden" id="detalle">
<button onclick="volver()">⬅ Volver</button>
<button onclick="compartir()">📤 Compartir</button>

<h3 id="titulo"></h3>
<div id="contenido"></div>

<button id="btnAdd" onclick="agregar()">➕</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVjGdI5Z3fW8bjHwfBgT5RoOfZZ4Vap8c",
  authDomain: "checklistempresa.firebaseapp.com",
  projectId: "checklistempresa",
  storageBucket: "checklistempresa.appspot.com",
  messagingSenderId: "798095528680",
  appId: "1:798095528680:web:3114c0b18d5b8001826f5d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let actualId=null;
let modoVista=false;

// CREAR
window.crear=async()=>{
let n=nombre.value.trim();
if(!n)return;
await addDoc(collection(db,"listas"),{nombre:n,items:[]});
nombre.value="";
cargar();
};

// CARGAR
async function cargar(){
listas.innerHTML="";
let snap=await getDocs(collection(db,"listas"));
snap.forEach(docu=>{
let d=docu.data();
listas.innerHTML+=`
<div class="card">
<div onclick="abrir('${docu.id}')">${d.nombre}</div>
<button onclick="borrarLista('${docu.id}')">🗑️</button>
</div>`;
});
}

// ABRIR
window.abrir=async(id)=>{
actualId=id;
home.classList.add("hidden");
detalle.classList.remove("hidden");

let snap=await getDoc(doc(db,"listas",id));
let d=snap.data();

titulo.innerText=d.nombre;

// CONTROL BOTON +
if(modoVista!==false){
btnAdd.style.display="none";
}else{
btnAdd.style.display="block";
}

render(d.items);
};

// RENDER
function render(items){
contenido.innerHTML="";
let total=[...items];

// 🔥 5 líneas para llenador
if(modoVista==="llenar"){
for(let i=0;i<5;i++){
total.push({texto:"",cantidad:0});
}
}

total.forEach((it,i)=>{
contenido.innerHTML+=`
<div class="row">

<input type="text" value="${it.texto || ""}"
${modoVista!==false?"disabled":""}
onchange="editarTexto(${i},this.value)">

<input class="qty" type="number" value="${it.cantidad || 0}"
${modoVista===true?"disabled":""}
onchange="cambiar(${i},this.value)">

</div>`;
});
}

// AGREGAR (solo creador)
window.agregar=async()=>{
if(modoVista!==false)return;

let txt=prompt("Agregar artículo:");
if(!txt)return;

let ref=doc(db,"listas",actualId);
let snap=await getDoc(ref);
let d=snap.data();

d.items.push({texto:txt,cantidad:1});
await updateDoc(ref,{items:d.items});
render(d.items);
};

// CAMBIAR
window.cambiar=async(i,val)=>{
let ref=doc(db,"listas",actualId);
let snap=await getDoc(ref);
let d=snap.data();

if(i>=d.items.length){
if(!val)return;
d.items.push({texto:"",cantidad:Number(val)});
}else{
d.items[i].cantidad=Number(val);
}

await updateDoc(ref,{items:d.items});
};

// EDITAR TEXTO SOLO CREADOR
window.editarTexto=async(i,val)=>{
if(modoVista!==false)return;

let ref=doc(db,"listas",actualId);
let snap=await getDoc(ref);
let d=snap.data();

d.items[i].texto=val;
await updateDoc(ref,{items:d.items});
};

// BORRAR LISTA
window.borrarLista=async(id)=>{
await deleteDoc(doc(db,"listas",id));
cargar();
};

// COMPARTIR
window.compartir=()=>{
let url=location.origin+location.pathname+"?id="+actualId+"&modo=llenar";
navigator.share ? navigator.share({title:"Inventario PRO",url}) : navigator.clipboard.writeText(url);
};

// VOLVER
window.volver=()=>location.href=location.pathname;

// INIT
function init(){
let p=new URLSearchParams(location.search);
let id=p.get("id");
let tipo=p.get("modo");

if(id){
if(tipo==="llenar")modoVista="llenar";
else if(tipo==="ver")modoVista=true;
else modoVista=false;

abrir(id);
}else{
cargar();
}
}

init();
</script>

</body>
</html>
